<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 멕시코 vs 한국 승부예측</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0008; color: #fff; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; min-height: 100vh; padding-bottom: 80px; overflow-x: hidden; }

/* HERO */
.hero { position: relative; width: 100%; overflow: hidden; background: #0a0005; }
.hero img { width: 100%; display: block; }
.hero-badge { position: absolute; top: 14px; left: 16px; background: rgba(180,0,0,0.92); font-size: 10px; font-weight: 800; letter-spacing: 2px; padding: 5px 14px; border-radius: 20px; text-transform: uppercase; }
.hero-text { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(10,0,8,1) 0%, rgba(10,0,8,0.75) 45%, transparent 100%); padding: 30px 18px 20px; }
.hero-vs { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.hero-flag { font-size: 44px; line-height: 1; }
.hero-vs-txt { font-size: 22px; font-weight: 900; color: #2a002a; letter-spacing: 4px; }
.hero-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 4px; }
.hero-title .acc { color: #cc0000; }
.hero-sub { font-size: 12px; color: #aaa; }

/* INFO STRIP */
.info-strip { display: flex; background: #0f0008; border-bottom: 1px solid #1e0010; overflow-x: auto; }
.info-item { padding: 9px 14px; display: flex; align-items: center; gap: 5px; white-space: nowrap; border-right: 1px solid #1e0010; font-size: 11px; color: #999; flex-shrink: 0; }

/* LIVE STATS */
.live-stats { margin: 14px 14px 0; background: rgba(200,0,0,0.07); border: 1px solid rgba(200,0,0,0.2); border-radius: 10px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
.stats-count { color: #ff6b6b; font-size: 13px; font-weight: 700; white-space: nowrap; }
.stats-pcts { display: flex; gap: 10px; font-size: 12px; flex: 1; justify-content: flex-end; flex-wrap: wrap; }

/* PLAYER IMAGES */
.player-img { width: 100%; background: #08000d; margin-top: 14px; }
.player-img img { width: 100%; display: block; }

/* FORM */
.form-box { margin: 14px 14px 0; background: rgba(255,255,255,0.025); border: 1px solid #1e001e; border-radius: 16px; padding: 22px 16px; }
.form-title { font-size: 17px; font-weight: 900; padding-bottom: 10px; border-bottom: 2px solid #cc0000; margin-bottom: 20px; }
.field { margin-bottom: 20px; }
.lbl { display: block; font-size: 11px; font-weight: 700; color: #666; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.lbl .sub { font-weight: 400; color: #333; text-transform: none; }
input[type=text], input[type=password] { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #2a002a; border-radius: 9px; color: #fff; font-size: 16px; padding: 13px 14px; outline: none; font-family: inherit; }
input[type=text]::placeholder, input[type=password]::placeholder { color: #444; }
input.custom-inp { margin-top: 6px; border-color: #cc0000; }

/* SCORE */
.score-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
.team-block { text-align: center; }
.team-flag { font-size: 38px; margin-bottom: 4px; }
.team-name { font-size: 10px; color: #555; margin-bottom: 10px; letter-spacing: 1px; font-weight: 700; }
.score-ctrl { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.04); border: 1px solid #1e1e2e; border-radius: 12px; padding: 8px 12px; }
.score-ctrl .sc-btn { border: none; width: 40px; height: 40px; border-radius: 8px; font-size: 24px; font-weight: 900; cursor: pointer; line-height: 1; display: flex; align-items: center; justify-content: center; }
.btn-g { background: #14532d; color: #4ade80; }
.btn-r { background: #7f1d1d; color: #ff6b6b; }
.score-num { font-size: 40px; font-weight: 900; min-width: 46px; text-align: center; color: #fff; }
.score-sep { font-size: 34px; font-weight: 900; color: #1a001a; padding-top: 24px; }
.res-preview { text-align: center; margin-top: 12px; min-height: 24px; font-weight: 800; font-size: 15px; }

/* SCORERS */
.scorer-row { margin-bottom: 8px; }
.scorer-top { display: flex; gap: 8px; align-items: center; }
select { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #2a002a; border-radius: 8px; color: #fff; font-size: 15px; padding: 11px 12px; outline: none; font-family: inherit; }
select option { background: #1a000a; }
.rm-btn { background: rgba(204,0,0,0.15); border: none; color: #f87171; border-radius: 7px; width: 32px; height: 32px; cursor: pointer; font-size: 13px; flex-shrink: 0; }
.add-btn { background: transparent; border: 1px dashed #2a002a; color: #444; font-size: 13px; border-radius: 8px; padding: 8px 16px; cursor: pointer; margin-top: 4px; font-family: inherit; }

/* SUBMIT */
.submit-btn { width: 100%; background: linear-gradient(90deg, #7b0000, #cc0000, #ef4444); border: none; color: #fff; font-weight: 900; font-size: 17px; padding: 16px; border-radius: 11px; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 6px 28px rgba(220,38,38,0.5); font-family: inherit; margin-top: 4px; }
.submit-btn:disabled { background: #1a000a; box-shadow: none; cursor: not-allowed; }
.err-msg { color: #f87171; font-size: 13px; margin-bottom: 12px; }

/* SUCCESS */
.success-box { text-align: center; padding: 28px 0; }
.s-emoji { font-size: 56px; margin-bottom: 12px; }
.s-name { color: #999; font-size: 14px; margin-bottom: 6px; }
.s-name strong { color: #ffd700; font-size: 17px; }
.s-score { font-size: 42px; font-weight: 900; letter-spacing: 4px; margin: 12px 0; display: flex; align-items: center; justify-content: center; gap: 14px; }
.s-result { font-weight: 800; font-size: 16px; margin-bottom: 6px; }
.s-msg { color: #444; font-size: 13px; margin-bottom: 22px; }
.retry-btn { background: transparent; border: 1px solid #2a002a; color: #777; font-size: 14px; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-family: inherit; }

/* FRIENDS */
.friends-box { margin: 14px 14px 0; background: rgba(255,255,255,0.015); border: 1px solid #150008; border-radius: 12px; padding: 16px; }
.friends-title { font-size: 12px; font-weight: 700; color: #440020; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
.f-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid #0f0008; gap: 10px; }
.f-row:last-child { border-bottom: none; }
.f-num { color: #2a0010; font-size: 11px; min-width: 18px; text-align: right; font-weight: 600; }
.f-name { font-weight: 700; color: #ccc; font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.f-score { font-weight: 900; font-size: 15px; letter-spacing: 2px; white-space: nowrap; }
.f-res { font-size: 11px; font-weight: 700; min-width: 68px; text-align: right; white-space: nowrap; }
.more-txt { color: #2a0010; font-size: 12px; text-align: center; margin-top: 10px; }
.admin-link { display: block; margin: 24px auto 0; background: transparent; border: none; color: #1e001e; font-size: 12px; cursor: pointer; padding: 8px; font-family: inherit; }

/* ADMIN */
.admin-wrap { min-height: 100vh; padding: 24px 16px 80px; }
.admin-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1a001a; padding-bottom: 16px; }
.admin-hdr h1 { font-size: 20px; font-weight: 800; }
.admin-hdr p { color: #555; font-size: 13px; margin-top: 4px; }
.back-btn { background: transparent; border: 1px solid #2a002a; color: #666; font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; }
.stat-row { display: flex; gap: 10px; margin-bottom: 20px; }
.stat-card { flex: 1; background: #0a000a; border-radius: 8px; padding: 12px 14px; }
.stat-n { font-size: 24px; font-weight: 900; color: #fff; }
.stat-l { font-size: 11px; color: #555; margin-top: 2px; }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
thead tr { background: #08000a; }
th { padding: 10px 12px; text-align: left; color: #444; font-weight: 600; font-size: 11px; border-bottom: 1px solid #1a001a; white-space: nowrap; }
tbody tr:nth-child(odd) { background: #08000a; }
tbody tr:nth-child(even) { background: #0f000f; }
td { padding: 10px 12px; color: #ccc; border-bottom: 1px solid #0a000a; vertical-align: middle; }
.del-btn { background: transparent; border: none; color: #2a002a; cursor: pointer; font-size: 16px; }
.refresh-btn { display: block; margin: 24px auto 0; background: transparent; border: 1px solid #2a002a; color: #444; font-size: 13px; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; }

/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: #0f000f; border: 1px solid #2a003a; border-radius: 16px; padding: 40px 32px; text-align: center; width: 280px; }
.login-box h2 { color: #fff; font-size: 18px; margin-bottom: 20px; font-weight: 800; }
.login-box input { text-align: center; }
.login-btn { width: 100%; background: linear-gradient(90deg,#7b0000,#cc0000); border: none; color: #fff; font-weight: 800; font-size: 16px; padding: 13px; border-radius: 8px; cursor: pointer; margin-top: 12px; font-family: inherit; }
.login-back { background: transparent; border: none; color: #444; font-size: 13px; cursor: pointer; margin-top: 14px; padding: 6px; font-family: inherit; display: block; width: 100%; }
.login-err { color: #f87171; font-size: 13px; margin-top: 6px; }
</style>

let S = {
  page: "predict",
  adminOk: false, adminPw: "", adminErr: false,
  name: "", mex: 0, kor: 0,
  scorers: [""],
  done: false, saving: false, err: "",
  preds: [], loading: true,
  binId: localStorage.getItem(BIN_KEY) || null
};

function ss(u) { S = {...S, ...u}; render(); }
function onNameInput(e) { S.name = e.target.value; }
function gr(m, k) {
  if (k > m) return { t: "🇰🇷 한국 승", c: "#ff4444" };
  if (m > k) return { t: "🇲🇽 멕시코 승", c: "#22c55e" };
  return { t: "⚖️ 무승부", c: "#aaa" };
}

// ── JSONBin ──────────────────────────────
async function loadPreds() {
  ss({ loading: true });
  try {
    if (!S.binId) {
      const r = await fetch("https://api.jsonbin.io/v3/b", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Master-Key": MK, "X-Bin-Name": "mex-v3", "X-Bin-Private": "false" },
        body: JSON.stringify({ preds: [] })
      });
      const d = await r.json();
      const id = d.metadata?.id;
      if (id) { localStorage.setItem(BIN_KEY, id); ss({ binId: id, preds: [], loading: false }); }
      else ss({ loading: false });
    } else {
      const r = await fetch("https://api.jsonbin.io/v3/b/" + S.binId + "/latest", {
        headers: { "X-Master-Key": MK }
      });
      const d = await r.json();
      ss({ preds: d.record?.preds || [], loading: false });
    }
  } catch(e) { ss({ loading: false }); }
}

async function savePreds(updated) {
  if (!S.binId) return;
  await fetch("https://api.jsonbin.io/v3/b/" + S.binId, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": MK },
    body: JSON.stringify({ preds: updated })
  });
}

async function handleSubmit() {
  if (!S.name.trim()) { ss({ err: "이름을 입력해주세요." }); return; }
  ss({ saving: true, err: "" });
  try {
    const entry = {
      id: Date.now(), name: S.name.trim(),
      mex: S.mex, kor: S.kor,
      scorers: S.scorers.filter(s => s.trim() && s !== "__custom__"),
      time: new Date().toLocaleString("ko-KR")
    };
    const updated = [entry, ...S.preds];
    await savePreds(updated);
    ss({ preds: updated, done: true, saving: false });
  } catch { ss({ saving: false, err: "저장 실패. 다시 시도해주세요." }); }
}

async function delEntry(id) {
  const u = S.preds.filter(p => p.id !== id);
  await savePreds(u); ss({ preds: u });
}

function updScorer(i, v) { const a = [...S.scorers]; a[i] = v; ss({ scorers: a }); }
function rmScorer(i) { const a = S.scorers.filter((_, j) => j !== i); ss({ scorers: a.length ? a : [""] }); }
function addScorer() { if (S.scorers.length < 5) ss({ scorers: [...S.scorers, ""] }); }
function tryAdmin() {
  const pw = document.getElementById("pwInput")?.value || S.adminPw;
  if (pw === ADMIN_PW) ss({ adminOk: true, adminErr: false });
  else ss({ adminErr: true });
}
function onSel(i, v) { updScorer(i, v); }

// ── RENDER ───────────────────────────────
function render() {
  const app = document.getElementById("app");
  const { page, adminOk, adminPw, adminErr, name, mex, kor, scorers, done, saving, err, preds, loading } = S;
  const stats = preds.length ? {
    total: preds.length,
    kw: preds.filter(p => p.kor > p.mex).length,
    d: preds.filter(p => p.kor === p.mex).length,
    mw: preds.filter(p => p.mex > p.kor).length
  } : null;

  // ADMIN LOGIN
  if (page === "admin" && !adminOk) {
    app.innerHTML = `
      <div class="login-wrap">
        <div class="login-box">
          <div style="font-size:40px;margin-bottom:12px">🔐</div>
          <h2>관리자 로그인</h2>
          <input type="password" id="pwInput" placeholder="비밀번호"
            oninput="ss({adminPw:this.value})"
            onkeydown="if(event.key==='Enter')tryAdmin()"/>
          ${adminErr ? '<p class="login-err">비밀번호가 틀렸습니다.</p>' : ''}
          <button class="login-btn" onclick="tryAdmin()">확인</button>
          <button class="login-back" onclick="ss({page:'predict'})">← 예측 페이지로</button>
        </div>
      </div>`;
    return;
  }

  // ADMIN DASHBOARD
  if (page === "admin" && adminOk) {
    const statCards = stats ? `
      <div class="stat-row">
        <div class="stat-card" style="border-left:3px solid #cc0000">
          <div class="stat-n">${stats.kw}</div><div class="stat-l">🇰🇷 한국 승</div>
        </div>
        <div class="stat-card" style="border-left:3px solid #444">
          <div class="stat-n">${stats.d}</div><div class="stat-l">⚖️ 무승부</div>
        </div>
        <div class="stat-card" style="border-left:3px solid #166534">
          <div class="stat-n">${stats.mw}</div><div class="stat-l">🇲🇽 멕시코 승</div>
        </div>
      </div>` : "";

    const rows = preds.map((p, i) => {
      const r = gr(p.mex, p.kor);
      return `<tr>
        <td style="color:#444;font-size:12px">${preds.length - i}</td>
        <td style="font-weight:700;color:#fff">${p.name}</td>
        <td style="font-weight:900;font-size:16px;letter-spacing:2px;white-space:nowrap">
          <span style="color:#4ade80">${p.mex}</span>
          <span style="color:#1e001e;margin:0 6px">:</span>
          <span style="color:#ff6b6b">${p.kor}</span>
        </td>
        <td style="color:${r.c};font-weight:600;font-size:12px;white-space:nowrap">${r.t}</td>
        <td style="color:#777;font-size:12px">${p.scorers?.length ? p.scorers.join(", ") : "—"}</td>
        <td style="color:#333;font-size:11px;white-space:nowrap">${p.time}</td>
        <td><button class="del-btn" onclick="delEntry(${p.id})">✕</button></td>
      </tr>`;
    }).join("");

    app.innerHTML = `
      <div class="admin-wrap">
        <div class="admin-hdr">
          <div><h1>📋 예측 현황</h1><p>총 ${preds.length}명 참여</p></div>
          <button class="back-btn" onclick="ss({adminOk:false,page:'predict'})">← 나가기</button>
        </div>
        ${statCards}
        ${loading
          ? '<p style="text-align:center;color:#333;padding:40px 0">불러오는 중...</p>'
          : preds.length === 0
            ? '<p style="text-align:center;color:#333;padding:40px 0">아직 예측이 없습니다.</p>'
            : `<div class="tbl-wrap"><table>
                <thead><tr><th>#</th><th>이름</th><th>스코어</th><th>결과</th><th>득점예측자</th><th>시간</th><th></th></tr></thead>
                <tbody>${rows}</tbody>
               </table></div>`}
        <button class="refresh-btn" onclick="loadPreds()">🔄 새로고침</button>
      </div>`;
    return;
  }

  // PREDICT PAGE
  const res = gr(mex, kor);

  const scorerFields = scorers.map((s, i) => {
    const isCustom = s === "__custom__" || (!PLAYERS.includes(s) && s !== "");
    const sv = PLAYERS.includes(s) ? s : (s ? "__custom__" : "");
    const opts = PLAYERS.map(p => `<option value="${p}"${p === s ? " selected" : ""}>${p}</option>`).join("");
    return `
      <div class="scorer-row">
        <div class="scorer-top">
          <select onchange="onSel(${i}, this.value)">
            <option value=""${sv === "" ? " selected" : ""}>선수 선택</option>

          </select>
          ${scorers.length > 1 ? `<button class="rm-btn" onclick="rmScorer(${i})">✕</button>` : ""}
        </div>
        ${isCustom ? `<input type="text" class="custom-inp" placeholder="선수 이름 직접 입력"
          value="${s === "__custom__" ? "" : s}"
          oninput="updScorer(${i}, this.value || '__custom__')"/>` : ""}
      </div>`;
  }).join("");

  const friendRows = preds.slice(0, 15).map((p, i) => {
    const r = gr(p.mex, p.kor);
    return `
      <div class="f-row">
        <span class="f-num">${i + 1}</span>
        <span class="f-name">${p.name}</span>
        <span class="f-score">
          <span style="color:#4ade80">${p.mex}</span>
          <span style="color:#1a000a;margin:0 3px">:</span>
          <span style="color:#ff6b6b">${p.kor}</span>
        </span>
        <span class="f-res" style="color:${r.c}">${r.t}</span>
      </div>`;
  }).join("");

  const statsBar = (!loading && stats) ? `
    <div class="live-stats">
      <span class="stats-count">🔥 ${stats.total}명 참여</span>
      <div class="stats-pcts">
        <span style="color:#ff6b6b">한국 ${Math.round(stats.kw / stats.total * 100)}%</span>
        <span style="color:#555">무 ${Math.round(stats.d / stats.total * 100)}%</span>
        <span style="color:#4ade80">멕시코 ${Math.round(stats.mw / stats.total * 100)}%</span>
      </div>
    </div>` : "";

  const formInner = done ? `
    <div class="success-box">
      <div class="s-emoji">🎉</div>
      <p class="s-name"><strong>${name}</strong>님의 예측</p>
      <div class="s-score">
        <span>🇲🇽</span>
        <span style="color:#4ade80">${mex}</span>
        <span style="color:#1a001a;font-size:30px">:</span>
        <span style="color:#ff6b6b">${kor}</span>
        <span>🇰🇷</span>
      </div>
      <p class="s-result" style="color:${res.c}">${res.t}</p>
      <p class="s-msg">🔥 대한민국 파이팅!</p>
      <button class="retry-btn" onclick="ss({done:false,name:'',mex:0,kor:0,scorers:['']})">다시 예측하기</button>
    </div>` : `
    <div class="field">
      <label class="lbl">이름 *</label>
      <input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="20"
        oninput="onNameInput(event)"/>
    </div>
    <div class="field">
      <label class="lbl">스코어 예측</label>
      <div class="score-row">
        <div class="team-block">
          <div class="team-flag">🇲🇽</div>
          <div class="team-name">MEXICO</div>
          <div class="score-ctrl">
            <button class="sc-btn btn-g" onclick="ss({mex:Math.max(0,S.mex-1)})">−</button>
            <span class="score-num">${mex}</span>
            <button class="sc-btn btn-g" onclick="ss({mex:Math.min(15,S.mex+1)})">+</button>
          </div>
        </div>
        <div class="score-sep">:</div>
        <div class="team-block">
          <div class="team-flag">🇰🇷</div>
          <div class="team-name">KOREA</div>
          <div class="score-ctrl">
            <button class="sc-btn btn-r" onclick="ss({kor:Math.max(0,S.kor-1)})">−</button>
            <span class="score-num">${kor}</span>
            <button class="sc-btn btn-r" onclick="ss({kor:Math.min(15,S.kor+1)})">+</button>
          </div>
        </div>
      </div>
      <div class="res-preview" style="color:${res.c}">${res.t}</div>
    </div>
    <div class="field">
      <label class="lbl">득점 예측자 <span class="sub">(선택 · 최대 5명)</span></label>
      ${scorerFields}
      ${scorers.length < 5 ? '<button class="add-btn" onclick="addScorer()">+ 득점자 추가</button>' : ""}
    </div>
    ${err ? `<p class="err-msg">${err}</p>` : ""}
    <button class="submit-btn" onclick="handleSubmit()" ${saving ? "disabled" : ""}>
      ${saving ? "저장 중..." : "🔥 예측 제출하기"}
    </button>`;

  app.innerHTML = `
    <div class="hero">
      <img src="${IMG_P2}" alt="대한민국 선수들"/>
      <div class="hero-badge">2026 FIFA 북중미 월드컵</div>
      <div class="hero-text">
        <div class="hero-vs">
          <span class="hero-flag">🇲🇽</span>
          <span class="hero-vs-txt">VS</span>
          <span class="hero-flag">🇰🇷</span>
        </div>
        <h1 class="hero-title">멕시코 <span class="acc">vs</span> 한국</h1>
        <p class="hero-sub">A조 2차전 · 6월 19일 (금) 오전 10:00 · 과달라하라</p>
      </div>
    </div>

    <div class="info-strip">
      <div class="info-item">📅 6/19 오전 10:00</div>
      <div class="info-item">📍 과달라하라 스타디움</div>
      <div class="info-item">📺 JTBC · KBS · 치지직</div>
    </div>

    ${statsBar}

    <div class="player-img"><img src="${IMG_P1}" alt="선수단"/></div>

    <div class="form-box">
      <div class="form-title">⚽ 나의 승부 예측</div>
      ${formInner}
    </div>

    ${preds.length > 0 ? `
    <div class="friends-box">
      <div class="friends-title">⚽ 친구들 예측 현황</div>
      ${friendRows}
      ${preds.length > 15 ? `<div class="more-txt">+${preds.length - 15}명 더</div>` : ""}
    </div>` : ""}

    <div class="player-img"><img src="${IMG_P3}" alt="선수 콜라주"/></div>

    <button class="admin-link" onclick="ss({page:'admin'})">🔐 관리자</button>`;
}

window.onload = () => { render(); loadPreds(); };

// render 후 이름 입력창 값 복원 (한글 조합 버그 방지)
const _origRender = render;
function render() {
  _origRender();
  const ni = document.getElementById('nameInput');
  if (ni && document.activeElement !== ni) ni.value = S.name;
}
</script>
</body>
</html>
